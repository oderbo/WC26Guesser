<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>WC26 Guesser</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<style>
* {
    box-sizing: border-box;
}

body { 
    margin: 0; 
    padding: 20px;
    font-family: Arial, sans-serif; 
    color: white; 
    
    display: flex; 
    align-items: center; 
    flex-direction: column; 
    
    min-height: 100dvh;
    width: 100%;
    
    background-color: #3f57f5; 
    background-image: url('assets/main_background.png?v=1');
    background-repeat: no-repeat;
}

/* --- LOGO WRAPPER & RESPONSIVE DESIGN --- */
.logo-container {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
}

.logo-mask {
    width: 100%;
    -webkit-mask-size: contain;
    mask-size: contain;
    -webkit-mask-repeat: no-repeat;
    mask-repeat: no-repeat;
    -webkit-mask-position: top center;
    
    background: linear-gradient(
        135deg, 
        #bf953f 0%, 
        #fcf6ba 25%, 
        #b38728 50%, 
        #fbf5b7 75%, 
        #aa771c 100%
    );
    background-size: 400% 400%;
    animation: goldGlow 8s ease infinite;
}

/* Der Freiraum in der Mitte (Standard: unsichtbar fürs Handy) */
.center-space {
    display: none;
}

/* --- DESKTOP LAYOUT --- */
@media (min-width: 768px) {
    body {
        justify-content: flex-start; 
        background-position: center;
        background-size: contain; 
        position: relative;
    }

    .logo-container {
        margin-top: 5vh; 
        margin-bottom: 0;
    }

    .logo-desktop {
        display: block;
        max-width: 1200px; 
        aspect-ratio: 3 / 1; 
        -webkit-mask-image: url('assets/WC26Guesser.svg');
        mask-image: url('assets/WC26Guesser.svg');
    }
    
    .logo-mobile {
        display: none; 
    }

    /* ERZWINGT DIE BUTTONS EXAKT BEI 50% VERTIKALER HÖHE */
    .menu-container {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: center;
        width: 100%;
        max-width: 1600px; 
        gap: 35px; /* Gleicher Abstand (x) zwischen allen Elementen */
    }

    .image-btn {
        width: 14%; 
    }

    /* Erzeugt auf dem Desktop den exakt 20% breiten Freiraum in der Mitte */
    .center-space {
        display: block;
        width: 20%;
        aspect-ratio: 1 / 1;
        visibility: hidden; /* Macht das Element komplett unsichtbar, hält aber den Platz frei */
    }
}

/* --- MOBILE LAYOUT (Garantiert wieder 2x2 Grid) --- */
@media (max-width: 767px) {
    body {
        justify-content: space-between; 
        background-size: cover; 
        background-position: center -90px; 
    }

    .logo-container {
        margin-top: calc(env(safe-area-inset-top, 0px) + 0vh);
        margin-bottom: 30px;
        padding: 0 15px;
    }
    
    .logo-desktop {
        display: none; 
    }
    
    .logo-mobile {
        display: block;
        max-width: 320px; 
        aspect-ratio: 1.2 / 1; 
        -webkit-mask-image: url('assets/WC_26_GUESSER.svg');
        mask-image: url('assets/WC_26_GUESSER.svg');
    }

    /* Das feste 2x2 Grid fürs iPhone */
    .menu-container {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 20px; 
        justify-items: center;
        align-items: center;
        max-width: 280px;
        margin-top: auto;
        margin-bottom: calc(env(safe-area-inset-bottom, 0px) + 20px); 
    }

    .image-btn {
        width: 30vw; 
    }
}

@keyframes goldGlow {
    0% { background-position: 0% 50%; filter: drop-shadow(0 0 4px rgba(251, 245, 183, 0.4)); }
    50% { background-position: 100% 50%; filter: drop-shadow(0 0 12px rgba(251, 245, 183, 0.85)); }
    100% { background-position: 0% 50%; filter: drop-shadow(0 0 4px rgba(251, 245, 183, 0.4)); }
}

/* --- IMAGE BUTTON SYSTEM --- */
.image-btn {
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    border: 1px solid rgba(255, 255, 255, 0.1); 
    border-radius: 14px; 
    cursor: pointer; 
    transition: all 0.2s ease; 
    box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
    aspect-ratio: 1 / 1; 
    padding: 0;
}

.image-btn:hover { 
    transform: translateY(-4px); 
    box-shadow: 0 8px 25px rgba(0, 255, 204, 0.4);
    border-color: #00ffcc;
}

.image-btn:active {
    transform: translateY(1px);
}

.image-btn:disabled { 
    filter: grayscale(80%) brightness(60%);
    cursor: not-allowed; 
    box-shadow: none;
    transform: none;
    border-color: rgba(255, 255, 255, 0.05);
}

.btn-random-nation { background-image: url('assets/country_random_button.jpg'); }
.btn-pick-nation { background-image: url('assets/country_pick_button.jpg'); }

/* HIER NEU: Relative Positionierung, damit das Badge darin fixiert werden kann */
.btn-player-random { 
    background-image: url('assets/player_random_button.png'); 
    position: relative;
}
.btn-multiplayer { background-image: url('assets/multiplayer.png'); }

/* --- TOP 10 BADGE STYLE (AKTUALISIERT) --- */
.top10-badge {
    position: absolute;
    top: 0;    /* Direkt an der Oberkante */
    right: 0;  /* Direkt an der Rechten Kante */
    
    background-color: #ffffff; /* Weißer Hintergrund */
    border-left: 1px solid rgba(0, 0, 0, 0.1);
    border-bottom: 1px solid rgba(0, 0, 0, 0.1);
    
    /* Übernimmt exakt die 14px Abrundung des Hauptbuttons für oben rechts */
    border-top-right-radius: inherit; 
    border-bottom-left-radius: 8px; /* Schicke Abrundung nach innen */
    
    padding: 6px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    cursor: pointer;
    box-shadow: -2px 2px 6px rgba(0,0,0,0.15);
    transition: background-color 0.2s ease;
}

.top10-badge:hover {
    background-color: #f0f2ff; /* Ganz leichtes bläuliches Grau beim Drüberfahren */
}

.top10-badge span {
    font-size: clamp(8px, 1.2vw, 10px);
    font-weight: bold;
    color: #3f57f5; /* Blaue Schriftfarbe passend zum Theme */
    letter-spacing: 0.5px;
}

/* Der kleine LED-Punkt unter dem Text */
.status-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background-color: #cccccc; /* Standard: Aus (neutrales Grau auf weißem Grund) */
    transition: all 0.3s ease;
}

/* Wenn der Filter aktiv ist (Grün leuchtend mit Glow-Effekt) */
.top10-badge.active .status-dot {
    background-color: #00cc44;
    box-shadow: 0 0 6px #00cc44, 0 0 12px #00cc44;
}
</style>
</head>
<body>

<div class="logo-container">
    <div class="logo-mask logo-desktop"></div>
    <div class="logo-mask logo-mobile"></div>
</div>

<div class="menu-container">
    <button class="image-btn btn-random-nation" onclick="startRandom()"></button>
    <button class="image-btn btn-pick-nation" onclick="openSelect()"></button>
    
    <div class="center-space"></div>
    
    <button class="image-btn btn-player-random" onclick="openRandomPlayer()">
        <div class="top10-badge" id="top10Badge" onclick="toggleTop10(event)">
            <span>TOP 10</span>
            <div class="status-dot"></div>
        </div>
    </button>
    
    <button class="image-btn btn-multiplayer" onclick="openMultiplayer()"></button>
</div>

<script>
// Beim Laden der Seite den gespeicherten Zustand abrufen
document.addEventListener("DOMContentLoaded", () => {
    const isTop10Active = localStorage.getItem("random_player_top10") === "true";
    const badge = document.getElementById("top10Badge");
    if (isTop10Active) {
        badge.classList.add("active");
    }
});

function startRandom() {
    fetch("./data/worldcup_teams.json")
        .then(r => r.json())
        .then(data => {
            const keys = Object.keys(data.teams);
            const random = keys[Math.floor(Math.random() * keys.length)];
            window.location.href = `game.html?team=${random}`;
        });
}

function openSelect() {
    window.location.href = "select.html";
}

function openRandomPlayer() {
    window.location.href = "game_random_player.html";
}

function openMultiplayer() {
    window.location.href = "select_multiplayer.html";
}

/* HIER NEU: Schaltet den Filter um, speichert ihn und verhindert das Auslösen des Hauptbuttons */
function toggleTop10(event) {
    event.stopPropagation(); // Verhindert, dass openRandomPlayer() aufgerufen wird!
    
    const badge = document.getElementById("top10Badge");
    const isActive = badge.classList.toggle("active");
    
    // Zustand dauerhaft im Browser speichern
    localStorage.setItem("random_player_top10", isActive);
}
</script>
</body>
</html>

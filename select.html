<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pick Nation</title>
<style>
* {
    box-sizing: border-box;
}

body { 
    margin: 0; 
    padding: 10px 6px; /* Radikal gekürzte Ränder links/rechts fürs Handy */
    font-family: Arial, sans-serif; 
    color: white; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    min-height: 100dvh;
    width: 100%;
    background-color: #3f57f5; 
}

h1 { 
    margin-top: calc(env(safe-area-inset-top, 0px) + 2px); /* Extrem nah an die Browser-Zeile geklebt */
    margin-bottom: 8px; /* Kaum noch Abstand nach unten */
    font-size: 20px; /* Kleinere, kompakte Überschrift */
    text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
}

/* --- GRUPPEN WRAPPER --- */
#groups {
    display: grid;
    width: 100%;
    max-width: 1400px;
    gap: 8px; /* Abstand zwischen den Gruppenboxen stark verringert */
    padding-bottom: 20px;
}

/* --- COMPACT GRUPPEN BOX --- */
.group-box {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.6); /* Dünnerer Rahmen spart Platz */
    border-radius: 8px;
    padding: 4px 6px; /* Extrem geschrumpftes Innen-Padding */
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}

/* Gruppenbuchstabe links */
.group-letter {
    font-size: 32px; /* Schmaler und kompakter */
    font-weight: bold;
    margin-right: 6px;
    min-width: 25px;
    text-align: center;
    line-height: 1;
}

/* 2x2 Feld für die Nationen */
.teams-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 4px; /* Engeres Raster für die Buttons */
    flex-grow: 1;
}

/* --- MINI NATIONEN BUTTON --- */
.team-button {
    display: flex;
    flex-direction: column; 
    align-items: center;
    justify-content: center;
    background: rgba(46, 111, 64, 0.9); 
    border: 1px solid rgba(255, 255, 255, 0.05);
    border-radius: 5px;
    padding: 3px 2px;
    cursor: pointer;
    transition: all 0.15s ease;
    color: white;
    width: 100%;
    min-height: 42px; /* Extrem flache Buttons, um vertikalen Platz zu sparen */
}

.team-button img { 
    width: 22px; 
    height: 14px; 
    margin-bottom: 1px;
    object-fit: contain; 
}

/* Text-Schutz vor Überlauf */
.team-button span {
    font-size: 10px;
    font-weight: bold;
    text-align: center;
    width: 100%;
    white-space: nowrap; /* Verhindert zweizeiligen Text, der die Boxen sprengt */
    overflow: hidden; /* Schneidet zu langen Text ab */
    text-overflow: ellipsis; /* Fügt ... bei zu langen Namen an */
    line-height: 1.1;
}

.team-button:hover { 
    background: #00ffcc; 
    color: #000; 
}

/* --- DESKTOP LAYOUT (Bleibt unangetastet weit und groß) --- */
@media (min-width: 768px) {
    body { padding: 20px; }
    h1 { margin-top: 30px; margin-bottom: 30px; font-size: 32px; }
    #groups { grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .group-box { padding: 15px; border: 2px solid rgba(255, 255, 255, 0.8); }
    .group-letter { font-size: 60px; margin-right: 15px; min-width: 50px; }
    .teams-grid { gap: 10px; }
    .team-button { min-height: 70px; padding: 8px 5px; }
    .team-button img { width: 35px; height: 22px; margin-bottom: 4px; }
    .team-button span { font-size: 11px; white-space: normal; overflow: visible; }
}

/* --- IPHONE SCREEN OPTIMIERUNG (2x6 Grid maximal gestaucht) --- */
@media (max-width: 767px) {
    #groups {
        grid-template-columns: repeat(2, 1fr); /* 2 Spalten, 6 Zeilen */
        gap: 6px; /* Minimale Lücke zwischen den 12 Blöcken */
    }
    
    .team-button span {
        /* Nutzt die Viewport-Breite (vw), damit die Schrift auf kleineren iPhones (z.B. SE) automatisch mitschrumpft */
        font-size: 2.4vw; 
    }
}
</style>
</head>
<body>

<h1>Select a Nation</h1>
<div id="groups"></div>

<script>
fetch("./data/worldcup_teams.json")
.then(r=>r.json())
.then(data=>{
    const container = document.getElementById("groups");

    Object.entries(data.groups).forEach(([groupName, teams])=>{
        const groupBox = document.createElement("div");
        groupBox.className = "group-box";

        const letterDiv = document.createElement("div");
        letterDiv.className = "group-letter";
        letterDiv.innerText = groupName;
        groupBox.appendChild(letterDiv);

        const teamsGrid = document.createElement("div");
        teamsGrid.className = "teams-grid";

        teams.forEach(teamKey=>{
            const team = data.teams[teamKey];
            if(!team) return;

            const btn = document.createElement("button");
            btn.className = "team-button";
            btn.innerHTML = `
                <img src="${team.flag}" alt="${team.name}"> 
                <span>${team.name}</span>
            `;
            
            btn.onclick = () => { window.location.href = `game.html?team=${teamKey}`; };
            teamsGrid.appendChild(btn);
        });

        groupBox.appendChild(teamsGrid);
        container.appendChild(groupBox);
    });
});
</script>
</body>
</html>

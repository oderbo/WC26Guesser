<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Pick Nation</title>
<style>
/* --- OFFIZIELLE TURNIER-SCHRIFT EINBINDEN --- */
@font-face {
    font-family: 'FWC2026';
    src: url('assets/FWC2026.ttf') format('truetype');
    font-weight: normal;
    font-style: normal;
}

* {
    box-sizing: border-box;
}

body { 
    margin: 0; 
    padding: 10px 6px; 
    font-family: 'FWC2026', Arial, sans-serif; /* Deine WM-Schriftart */
    color: white; 
    display: flex; 
    flex-direction: column; 
    align-items: center; 
    min-height: 100dvh;
    width: 100%;
    background-color: #3f57f5; 
}

h1 { 
    /* 1. Überschrift maximal nach oben gezogen */
    margin-top: calc(env(safe-area-inset-top, 0px) + 0px); 
    margin-bottom: 6px; 
    font-size: 22px; 
    text-transform: uppercase;
    text-shadow: 0 1px 3px rgba(0,0,0,0.4);
    font-family: 'FWC2026', Arial, sans-serif;
    letter-spacing: 1px;
}

/* --- GRUPPEN WRAPPER --- */
#groups {
    display: grid;
    width: 100%;
    max-width: 1400px;
    gap: 8px; 
    padding-bottom: 20px;
}

/* --- COMPACT GRUPPEN BOX --- */
.group-box {
    display: flex;
    align-items: center;
    background: rgba(255, 255, 255, 0.03);
    border: 1px solid rgba(255, 255, 255, 0.6); 
    border-radius: 8px;
    padding: 4px 6px; 
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
}

/* Gruppenbuchstabe links */
.group-letter {
    font-size: 34px; 
    font-weight: bold;
    margin-right: 6px;
    min-width: 25px;
    text-align: center;
    line-height: 1;
}

/* 2x2 Feld für die Nationen */
.teams-grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    grid-template-rows: repeat(2, 1fr);
    gap: 4px; 
    flex-grow: 1;
}

/* --- OPTIMIERTES MODERNES BUTTON-LAYOUT --- */
.team-button {
    display: flex;
    flex-direction: row; /* Wappen links, Text rechts */
    align-items: center;
    justify-content: space-between;
    background: #2e6f40; /* Fallback, falls Farben im JSON fehlen */
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 6px;
    padding: 2px 4px;
    cursor: pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    color: white;
    width: 100%;
    min-height: 44px; 
    position: relative;
    overflow: hidden;
}

/* Flagge füllt nun fast die komplette Höhe aus */
.team-button img { 
    height: 34px; 
    width: auto;
    max-width: 65%;
    object-fit: contain; 
    filter: drop-shadow(0 1px 3px rgba(0,0,0,0.3));
}

/* Um 90 Grad gedrehtes Länderkürzel an der rechten Seite */
.team-button span {
    font-size: 10px;
    font-weight: bold;
    text-align: center;
    font-family: 'FWC2026', Arial, sans-serif;
    
    /* CSS Magic für die vertikale Schrift */
    writing-mode: vertical-rl;
    transform: rotate(180deg);
    
    white-space: nowrap;
    line-height: 1;
    padding-left: 2px;
    text-shadow: 1px 1px 2px rgba(0,0,0,0.6);
    opacity: 0.95;
}

.team-button:hover { 
    transform: scale(1.02);
    box-shadow: inset 0 0 100px rgba(255,255,255,0.2); /* Heller Glow-Effekt statt Farbzerstörung */
}

/* --- DESKTOP LAYOUT --- */
@media (min-width: 768px) {
    body { padding: 20px; }
    h1 { margin-top: 20px; margin-bottom: 25px; font-size: 36px; }
    #groups { grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .group-box { padding: 12px; border: 2px solid rgba(255, 255, 255, 0.8); }
    .group-letter { font-size: 50px; margin-right: 12px; min-width: 45px; }
    .teams-grid { gap: 10px; }
    .team-button { min-height: 65px; padding: 4px 8px; }
    .team-button img { height: 50px; }
    .team-button span { font-size: 13px; }
}

/* --- IPHONE SCREEN OPTIMIERUNG --- */
@media (max-width: 767px) {
    #groups {
        grid-template-columns: repeat(2, 1fr); 
        gap: 6px; 
    }
}
</style>
</head>
<body>

<h1>Select a Nation</h1>
<div id="groups"></div>

<script>
fetch("./data/worldcup_teams.json")
.then(r=>r.json())
.then(data=>{
    const container = document.getElementById("groups");

    Object.entries(data.groups).forEach(([groupName, teams])=>{
        const groupBox = document.createElement("div");
        groupBox.className = "group-box";

        const letterDiv = document.createElement("div");
        letterDiv.className = "group-letter";
        letterDiv.innerText = groupName;
        groupBox.appendChild(letterDiv);

        const teamsGrid = document.createElement("div");
        teamsGrid.className = "teams-grid";

        teams.forEach(teamKey=>{
            const team = data.teams[teamKey];
            if(!team) return;

            const btn = document.createElement("button");
            btn.className = "team-button";
            
            // Wenn color_1 und color_2 im JSON existieren, erstelle einen schicken Farbverlauf
            if(team.color_1 && team.color_2) {
                btn.style.background = `linear-gradient(135deg, ${team.color_1}, ${team.color_2})`;
            }

            // Nutzt "country_code" falls vorhanden, sonst Fallback auf die ersten 3 Buchstaben des Namens
            const displayCode = team.country_code ? team.country_code : team.name.substring(0,3).toUpperCase();

            btn.innerHTML = `
                <img src="${team.flag}" alt="${team.name}"> 
                <span>${displayCode}</span>
            `;
            
            btn.onclick = () => { window.location.href = `game.html?team=${teamKey}`; };
            teamsGrid.appendChild(btn);
        });

        groupBox.appendChild(teamsGrid);
        container.appendChild(groupBox);
    });
});
</script>
</body>
</html>

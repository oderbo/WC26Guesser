<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>WC26 Guesser</title>
<link rel="icon" type="image/png" href="assets/favicon.png">
<link rel="apple-touch-icon" href="assets/apple-touch-icon.png">
<style>
* {
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

html {
    height: 100dvh;
    height: var(--visual-height, 100dvh);
    background-color: #0f1115;
    padding: 6px;
    box-sizing: border-box;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    background-attachment: fixed;
}

body {
    margin: 0;
    padding: 0;
    height: 100%;
    overflow: hidden;
    color: white;
    display: flex;
    flex-direction: column;
    background: transparent;
}

/* ======================================================== */
/* 1. LAYOUT STRUCTURING                                    */
/* ======================================================== */
.layout {
    display: grid;
    grid-template-columns: 260px 1fr 320px; 
    gap: 16px;
    padding: 12px;
    height: calc(var(--visual-height, 100dvh) - 100px); 
    width: 100%;
    align-items: stretch;
}

.header-mobile-wrap {
    display: none; 
}

.side-content {
    padding: 16px;
    text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8); 
    height: 100%;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    background: rgba(20, 22, 27, 0.85);
    border: 2px solid var(--c2, #fff);
    outline: 2px solid var(--c3, #fff);
    outline-offset: -4px;
    border-radius: 14px;
}

.center { text-align: center; }

/* Hellblau leuchtender, minimalistischer Counter */
.score-box {
    font-size: 28px;
    font-weight: bold;
    margin-top: 15px;
    background: rgba(0, 162, 255, 0.2);
    color: #ffffff;
    padding: 8px 25px;
    border-radius: 20px;
    display: inline-block;
    border: 2px solid #00a2ff;
    box-shadow: 0 0 15px rgba(0, 162, 255, 0.6);
    text-shadow: 0 0 8px rgba(255, 255, 255, 0.6);
}

/* Absolut perfektes zentrales Banner für den Desktop-Stop-Button */
.stop-banner-desktop {
    width: 100%;
    display: flex;
    justify-content: center;
    align-items: center;
    margin-bottom: 15px;
}

.btn-stop-global {
    background: #e63946 !important;
    color: white;
    border: none;
    padding: 14px 50px;
    font-size: 18px;
    font-weight: bold;
    border-radius: 25px;
    cursor: pointer;
    text-decoration: none;
    box-shadow: 0 4px 15px rgba(230, 57, 70, 0.4);
    transition: transform 0.2s, background-color 0.2s;
}
.btn-stop-global:hover {
    transform: scale(1.05);
    background: #ff4d5a !important;
}

.card {
    display: flex;
    gap: 12px;
    background: rgba(10, 11, 14, 0.6);
    border: 1px solid rgba(255, 255, 255, 0.1);
    padding: 12px;
    border-radius: 12px;
    margin-bottom: 12px;
    align-items: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.3);
}

.card img.player-img {
    width: 55px;
    height: 68px;
    object-fit: cover;
    border-radius: 6px;
    background: rgba(255,255,255,0.05);
}

.card-info {
    display: flex;
    flex-direction: column;
    gap: 4px;
    flex: 1;
    font-size: 13px;
    color: #cccccc;
}

.card-info .player-name {
    font-size: 15px;
    color: #ffffff;
}

.card-info .meta-row { display: flex; gap: 8px; }
.card-info .club-row { display: flex; align-items: center; gap: 6px; margin-top: 2px; }
.card img.club-icon { width: 18px; height: 18px; object-fit: contain; }

/* ======================================================== */
/* 2. PITCH SYSTEM & GAMEPLAY ELEMENTS                      */
/* ======================================================== */
.panel-pitch {
    background: rgba(20, 22, 27, 0.85);
    padding: 0;
    height: 100%;
    width: 100%;
    display: flex;
    flex-direction: column;
    border: 2px solid var(--c2, #fff);
    outline: 2px solid var(--c3, #fff);
    outline-offset: -4px;
    border-radius: 14px;
    overflow: hidden;
}

.pitch {
    background: var(--c2, #2e7d32);
    height: 100%;
    display: flex;
    justify-content: center; 
    align-items: center;
    padding: 10px; 
    position: relative;
}

.game-container {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    width: 100%;
    height: 100%;
}

/* Spielerbild-Rahmen: Exakt 15% kleiner als vorher */
.center-player-frame {
    width: clamp(85px, 18.7vh, 153px);
    aspect-ratio: 1 / 1.25;
    border-radius: 14px;
    border: 4px solid var(--c3, #fff);
    box-shadow: 0 8px 25px rgba(0,0,0,0.6);
    background: rgba(15, 17, 21, 0.6);
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 2;
}

.center-player-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
}

/* i-Button links neben dem verkleinerten Bild angepasst */
.info-trigger-btn {
    position: absolute;
    left: calc(50% - clamp(85px, 18.7vh, 153px) / 2 - 60px);
    width: 44px;
    height: 44px;
    border-radius: 50%;
    background: #00a2ff;
    border: 2px solid white;
    color: white;
    font-size: 20px;
    font-weight: bold;
    font-style: italic;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.4);
    transition: opacity 0.2s, visibility 0.2s;
    z-index: 3;
}

/* Linkes Info Panel: Passt sich dem kleineren Bild an */
.hints-panel {
    position: absolute;
    left: 2px;
    right: calc(50% + clamp(85px, 18.7vh, 153px) / 2 + 2px);
    background: rgba(10, 11, 14, 0.95);
    border: 2px solid var(--c3, #fff);
    padding: 12px 16px;
    border-radius: 12px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
    box-shadow: 0 6px 15px rgba(0,0,0,0.5);
    cursor: pointer;
    
    opacity: 0;
    visibility: hidden;
    transform: translateX(-15px);
    transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
    z-index: 1;
}

/* Rechtes Wappen Panel: Clean, transparent, ohne Hintergrund/Rahmen & dauerhaft sichtbar */
.badge-panel {
    position: absolute;
    left: calc(50% + clamp(85px, 18.7vh, 153px) / 2 + 2px);
    right: 2px;
    height: auto;
    max-height: 90%;
    background: transparent; /* Absolut transparent */
    border: none;             /* Kein Rahmen */
    padding: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    
    /* Dauerhaft sichtbar geschaltet */
    opacity: 1;
    visibility: visible;
}

.badge-panel img {
    max-width: 85%;
    max-height: 140px;
    object-fit: contain;
    /* Ein dezenter Schatten, damit transparente Logos auf dem Rasen gut lesbar sind */
    filter: drop-shadow(0px 4px 8px rgba(0, 0, 0, 0.6)); 
}

/* Nur noch das linke Panel wird über diese Klasse getriggert */
.game-container.info-active .hints-panel {
    opacity: 1;
    visibility: visible;
    transform: translateX(0);
}

.game-container.info-active .info-trigger-btn {
    opacity: 0;
    visibility: hidden;
    pointer-events: none;
}

.hint-item {
    font-size: 13px;
    color: #e0e0e0;
}
.hint-label {
    font-size: 10px;
    color: #888888;
    text-transform: uppercase;
    display: block;
}

/* ======================================================== */
/* 3. INPUT WRAPPER                                         */
/* ======================================================== */
.input-wrap {
    height: 80px;
    display: flex;
    justify-content: center;
    align-items: center;
    width: 100%;
    padding: 0 20px;
    background: transparent; 
    flex-shrink: 0;
}

input {
    width: 40%;
    padding: 14px;
    border-radius: 30px;
    text-align: center;
    font-size: 16px;
    outline: none;
    background: #ffffff !important; 
    color: #000000 !important;    
    border: 2px solid var(--c2, #fff);
    outline: 2px solid var(--c3, #fff);
    outline-offset: -4px;
}

input::placeholder {
    color: #888888;
}

input:disabled {
    background: #22252a !important;
    color: #555555 !important;
    cursor: not-allowed;
    outline: none;
    border: 1px solid rgba(255,255,255,0.1);
}

/* ======================================================== */
/* 4. SMARTPHONE LAYOUT                                     */
/* ======================================================== */
@media (max-width: 850px) {
    html {
        padding: 0;
        padding-top: env(safe-area-inset-top, 0px);
    }

    .desktop-only, 
    .id-desktop-left,
    .stop-banner-desktop {
        display: none !important; 
    }

    .layout {
        display: grid;
        grid-template-columns: 1fr;
        grid-template-rows: auto 1fr; 
        gap: 0px;
        padding: 4px;
        height: calc(var(--visual-height, 100%) - 48px); 
        align-items: stretch;
    }

    .header-mobile-wrap {
        display: flex;
        width: 100%;
        height: 48px; 
        align-items: center;
        justify-content: space-between; 
        padding: 0 10px;
        flex-shrink: 0;
        background: rgba(15, 17, 21, 0.85);
        margin-bottom: 4px; 
        border: 1px solid var(--c2, #fff);
        outline: 1px solid var(--c3, #fff);
        outline-offset: -2px;
        border-radius: 10px;
    }
    
    .score-box {
        font-size: 16px;
        margin-top: 0;
        padding: 4px 15px;
        border-radius: 12px;
    }

    .btn-stop-global {
        padding: 6px 20px;
        font-size: 13px;
    }

    #historyMobile { display: flex; gap: 3px; align-items: center; }
    #historyMobile .card { margin-bottom: 0; padding: 0; background: transparent; border: none; box-shadow: none; }
    #historyMobile .card img.player-img { width: 22px; height: 28px; border: 1px solid rgba(255,255,255,0.3); }

    .panel-pitch {
        grid-row: 2; 
        flex: 1;
        min-height: 0; 
        border: none;
        outline: none;
        border-radius: 12px;
        box-shadow: inset 0 0 0 2px var(--c2, #fff), inset 0 0 0 4px var(--c3, #fff);
    }
    
    .pitch {
        padding: 10px;
    }

    .hints-panel {
        left: 2px;
        right: calc(50% + clamp(85px, 18.7vh, 153px) / 2 + 2px);
        padding: 6px 8px;
    }

    .badge-panel {
        left: calc(50% + clamp(85px, 18.7vh, 153px) / 2 + 2px);
        right: 2px;
        padding: 8px;
    }
    .badge-panel img {
        max-height: 80px;
    }
    
    .info-trigger-btn {
        left: calc(50% - clamp(85px, 18.7vh, 153px) / 2 - 50px);
    }

    .input-wrap {
        height: 44px;
        padding: 4px 10px;
    }

    input {
        width: 100%; 
        padding: 8px;
        font-size: 14px;
    }
}
</style>
</head>

<body>

<div class="layout" id="mainLayout">

    <!-- Desktop Sidebar Links -->
    <div class="side-content center id-desktop-left">
        <div class="score-box" id="scoreDesktop">0</div>
        <div style="margin-top:auto; width:100%;">
            <a href="index.html" class="btn-stop-global" style="background:#00a2ff !important; box-shadow:none; display:block; text-align:center; margin-bottom:10px;">Hauptmenü</a>
        </div>
    </div>

    <!-- Mobile Header -->
    <div class="header-mobile-wrap">
        <div class="score-box" id="scoreMobile">0</div>
        <a href="index.html" class="btn-stop-global">STOP</a>
        <div id="historyMobile"></div>
    </div>

    <!-- Zentrales Spielfeld-Panel -->
    <div class="panel-pitch" id="pitchParent">
        
        <!-- Perfekt zentrierter STOP-Button oben auf Desktop -->
        <div class="stop-banner-desktop">
            <a href="index.html" class="btn-stop-global">STOP</a>
        </div>

        <div class="pitch" id="pitch">
            
            <div class="game-container" id="gameContainer">
                
                <!-- Der blaue Info-Trigger links -->
                <button class="info-trigger-btn" id="infoBtn" onclick="toggleHints(true, event)">i</button>
                
                <!-- Info-Panel (Tipps fährt nach links aus) -->
                <div class="hints-panel" id="hintsPanel" onclick="toggleHints(false, event)">
                    <div class="hint-item"><span class="hint-label">Position</span><b id="hintPosition">—</b></div>
                    <div class="hint-item"><span class="hint-label">Alter</span><b id="hintAge">—</b></div>
                    <div class="hint-item"><span class="hint-label">Größe</span><b id="hintHeight">—</b></div>
                    <div class="hint-item"><span class="hint-label">Verein</span>
                        <div class="club-row" style="margin-top:4px;">
                            <img id="hintClubIcon" class="club-icon" src="" alt="" onerror="this.style.display='none'">
                            <b id="hintClubName">—</b>
                        </div>
                    </div>
                </div>

                <!-- Das geratene Spielerbild (bleibt starr im Mittelpunkt) -->
                <div class="center-player-frame">
                    <img id="centerPlayerImg" src="" alt="Spieler">
                </div>

                <!-- Wappen-Panel (Dauerhaft sichtbar, clean ohne Hintergrund) -->
                <div class="badge-panel" id="badgePanel">
                    <img id="nationBadgeImg" src="" alt="Wappen">
                </div>
                
            </div>

        </div>
    </div>

    <!-- Desktop Sidebar Rechts (Verlauf) -->
    <div class="side-content desktop-only">
        <h3 style="margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 8px;">Letzte Spieler</h3>
        <div id="historyDesktop"></div>
    </div>

</div>

<!-- Input-Leiste unten -->
<div class="input-wrap" id="inputWrap">
    <input 
        id="input" 
        type="text" 
        inputmode="search" 
        name="search"
        autocomplete="off" 
        autocorrect="off" 
        autocapitalize="off" 
        spellcheck="false" 
        placeholder="Spielername eingeben..."
    >
</div>

<script>
// ========================================================
// 1. CONF & DATA FILTER SYSTEM
// ========================================================
const useTop10Only = localStorage.getItem("random_player_top10") === "true";
const top10Nations = ["argentina", "belgium", "brazil", "england", "france", "germany", "morocco", "netherlands", "portugal", "spain"];

const game = {
    allTeamsList: {},
    currentTeamFolder: "",
    currentTeamDetails: null,
    currentPlayer: null,
    score: 0,
    history: [],
    finished: false
};

// ========================================================
// VIEWPORT KEYBOARD FIX
// ========================================================
function updateVisualViewport() {
    if (window.visualViewport) {
        const vvHeight = window.visualViewport.height;
        document.documentElement.style.setProperty('--visual-height', `${vvHeight}px`);
        window.scrollTo(0, 0);
    }
}
if (window.visualViewport) {
    window.visualViewport.addEventListener('resize', updateVisualViewport);
    window.visualViewport.addEventListener('scroll', updateVisualViewport);
}
updateVisualViewport();

// Lade alle Teams aus der JSON
fetch("./data/worldcup_teams.json")
.then(r => r.json())
.then(d => {
    if (useTop10Only) {
        game.allTeamsList = {};
        for (let key in d.teams) {
            if (top10Nations.includes(d.teams[key].folder.toLowerCase())) {
                game.allTeamsList[key] = d.teams[key];
            }
        }
    } else {
        game.allTeamsList = d.teams;
    }
    nextRandomPlayerRound();
});

// ========================================================
// CORE GAME LOGIC
// ========================================================
function nextRandomPlayerRound() {
    toggleHints(false, null);

    document.getElementById("input").value = "";
    document.getElementById("input").disabled = false;
    document.getElementById("input").placeholder = "Spielername eingeben..."
    document.getElementById("input").focus();

    const teamKeys = Object.keys(game.allTeamsList);
    if(teamKeys.length === 0) return;

    const randomTeamKey = teamKeys[Math.floor(Math.random() * teamKeys.length)];
    const selectedTeam = game.allTeamsList[randomTeamKey];
    game.currentTeamFolder = selectedTeam.folder;

    fetch(`./data/${selectedTeam.folder}/info.json`)
    .then(r => r.json())
    .then(teamDetails => {
        game.currentTeamDetails = teamDetails;
        
        const c1 = teamDetails.color_1 || "#1565c0"; 
        const c2 = teamDetails.color_2 || "#ffffff";
        const c3 = teamDetails.color_3 || "#ffffff";
        document.documentElement.style.setProperty('--c1', c1); 
        document.documentElement.style.setProperty('--c2', c2);
        document.documentElement.style.setProperty('--c3', c3);

        const playersList = teamDetails.players;
        if(!playersList || playersList.length === 0) {
            nextRandomPlayerRound();
            return;
        }
        
        const randomPlayer = playersList[Math.floor(Math.random() * playersList.length)];
        game.currentPlayer = randomPlayer;

        // Bilder & Informationen setzen
        document.getElementById("centerPlayerImg").src = `./data/${game.currentTeamFolder}/players/${randomPlayer.jersey_number}.png`;
        document.getElementById("nationBadgeImg").src = `./data/${game.currentTeamFolder}/logo.png`; 
        
        document.getElementById("hintPosition").innerText = randomPlayer.position || "N/A";
        document.getElementById("hintAge").innerText = `${calculateAge(randomPlayer.birthdate)} Jahre`;
        document.getElementById("hintHeight").innerText = randomPlayer.height || "—";
        document.getElementById("hintClubName").innerText = randomPlayer.club || "Kein Verein";
        document.getElementById("hintClubIcon").src = `./data/${game.currentTeamFolder}/clubs/${(randomPlayer.club || "").trim()}.png`;
        document.getElementById("hintClubIcon").style.display = "inline-block";
    });
}

function toggleHints(show, event) {
    if (event) {
        event.preventDefault();
        event.stopPropagation();
    }
    
    const container = document.getElementById("gameContainer");
    if (show) {
        container.classList.add("info-active");
    } else {
        container.classList.remove("info-active");
    }

    setTimeout(() => {
        document.getElementById("input").focus();
    }, 10);
}

// ========================================================
// INPUT VALIDATION & SCORE COUNTER
// ========================================================
document.getElementById("input").addEventListener("input", (e) => {
    if(!game.currentPlayer || game.finished) return;
    
    const v = e.target.value.toLowerCase().trim();
    if(!v) return;

    const pl = game.currentPlayer;
    const firstName = (pl.first_name || "").toLowerCase().trim();
    const lastName = (pl.last_name || "").toLowerCase().trim();
    const full = lastName ? `${firstName} ${lastName}` : firstName;
    
    const isCorrect = (v === full || v === firstName || v === lastName || (pl.aliases || []).map(a=>a.toLowerCase().trim()).includes(v));

    if(isCorrect) {
        game.score++;
        document.getElementById("scoreDesktop").innerText = game.score;
        document.getElementById("scoreMobile").innerText = game.score;

        updateHistories(pl, game.currentTeamFolder);
        nextRandomPlayerRound();
    }
});

// ========================================================
// HELPERS
// ========================================================
function calculateAge(birthdateString) {
    if (!birthdateString) return "N/A";
    const parts = birthdateString.split('.');
    if (parts.length !== 3) return "N/A";
    const day = parseInt(parts[0], 10);
    const month = parseInt(parts[1], 10) - 1;
    const year = parseInt(parts[2], 10);
    const birthDate = new Date(year, month, day);
    if (isNaN(birthDate.getTime())) return "N/A";
    const today = new Date();
    let age = today.getFullYear() - birthDate.getFullYear();
    const m = today.getMonth() - birthDate.getMonth();
    if (m < 0 || (m === 0 && today.getDate() < birthDate.getDate())) {
        age--;
    }
    return age;
}

function updateHistories(p, folder){
    game.history.unshift({ player: p, folder: folder });
    game.history = game.history.slice(0, 3);
    
    const hDesktop = document.getElementById("historyDesktop");
    if (hDesktop) {
        hDesktop.innerHTML = "";
        game.history.forEach(x => {
            const age = calculateAge(x.player.birthdate);
            const firstName = x.player.first_name ? `${x.player.first_name} ` : "";
            const fullName = `${firstName}${x.player.last_name}`;
            const clubClean = (x.player.club || "").trim();
            
            const d = document.createElement("div");
            d.className = "card";
            d.innerHTML = `
                <img class="player-img" src="./data/${x.folder}/players/${x.player.jersey_number}.png" alt="">
                <div class="card-info">
                    <div class="player-name"><b>${fullName}</b></div>
                    <div class="meta-row">
                        <span>#${x.player.jersey_number || "N/A"}</span> • 
                        <span>${age} Jrs</span> • 
                        <span>${x.player.height || "—"}</span>
                    </div>
                    <div class="club-row">
                        <img class="club-icon" src="./data/${x.folder}/clubs/${clubClean}.png" onerror="this.style.display='none'" alt="">
                        <span>${x.player.club || "No Club"}</span>
                    </div>
                </div>
            `;
            hDesktop.appendChild(d);
        });
    }

    const hMobile = document.getElementById("historyMobile");
    if (hMobile) {
        hMobile.innerHTML = "";
        game.history.forEach(x => {
            const d = document.createElement("div");
            d.className = "card";
            d.innerHTML = `<img class="player-img" src="./data/${x.folder}/players/${x.player.jersey_number}.png" alt="">`;
            hMobile.appendChild(d);
        });
    }
}
</script>
</body>
</html>
